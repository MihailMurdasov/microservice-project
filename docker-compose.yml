version: "3.9"

services:
  web1:
    build: ./web1
    container_name: web1
    environment:
      - APP_NAME=WEB1
    networks:
      - app-network
    ports:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  web2:
    build: ./web2
    container_name: web2
    environment:
      - APP_NAME=WEB2
    networks:
      - app-network
    ports:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  nginx:
    build: ./nginx
    container_name: nginx-lb
    ports:
      - "8080:80"
    networks:
      - app-network
    depends_on:
      web1:
        condition: service_healthy
      web2:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  app-network:
    driver: bridge
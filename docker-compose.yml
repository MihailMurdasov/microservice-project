services:
  web1:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./web:/app
    command: ["python", "app.py"]
    expose:
      - "8000"

  web2:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./web:/app
    command: ["python", "app.py"]
    expose:
      - "8000"

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web1
      - web2

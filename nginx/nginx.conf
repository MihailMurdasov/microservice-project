events {
    worker_connections 1024;
}

http {
    # Формат логов для демострации пути запросов
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'upstream="$upstream_addr" backend="$upstream_status"';

    # Группа микросервисов
    upstream backend {      
        server web1:8000 max_fails=3 fail_timeout=30s;
        server web2:8000 max_fails=3 fail_timeout=30s;
    }

    server {
        listen 80;
        server_name localhost;
        
        # Логируем все запросы в формате main
        access_log /var/log/nginx/access.log main;
        error_log /var/log/nginx/error.log warn;

        # Проверка состояния всей системы
        location /health {
            proxy_pass http://backend/health;
            proxy_set_header Host $host;

            proxy_connect_timeout 3s;
            proxy_read_timeout 3s;
        }
        
        # Основной трафик
        location / {
            proxy_pass http://backend;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_connect_timeout 5s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }
    }
}
